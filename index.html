<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Calculator List</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #fdf6f0; /* creamy white */
    color: #5a0f0f; /* dark red */
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  .item {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  input {
    padding: 8px;
    border: 1px solid #5a0f0f;
    border-radius: 5px;
    width: 100%;
  }

  .result {
    background-color: #f3dede;
    text-align: center;
  }

  button {
    background-color: #7a1c1c;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background-color: #5a0f0f;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
  }

  .big-btn {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 20px;
  }

  .extra-box {
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Mini Tool</h1>

  <div id="list"></div>

  <div class="controls">
    <button onclick="addItem()">+ Add Item</button>
    <button onclick="removeItem()">- Remove Item</button>
  </div>

  <div class="extra-box">
    <input id="extraInput" type="number" placeholder="Extra number">
  </div>

  <button class="big-btn" onclick="calculate()">Calculate</button>
</div>

<script>
  function addItem() {
    const list = document.getElementById("list");

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <input type="number" placeholder="Input">
      <input class="result" type="text" placeholder="Result" disabled>
    `;

    list.appendChild(div);
  }

  function removeItem() {
    const list = document.getElementById("list");
    if (list.lastChild) {
      list.removeChild(list.lastChild);
    }
  }

  function calculate() {
    const items = document.querySelectorAll(".item");
    const extra = document.getElementById("extraInput").value;

    items.forEach(item => {
      const input = item.children[0].value;
      const resultBox = item.children[1];

      // 🔧 PUT YOUR MATH HERE
      // Example placeholder:
      let result = Number(input) + Number(extra || 0);

      resultBox.value = result;
    });
  }

  // start with one item
  addItem();
</script>

</body>
</html>
