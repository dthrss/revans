<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revans Calculator</title>
  
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #fdf6f0;
    color: #5a0f0f;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  .item {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  input {
    padding: 8px;
    border: 1px solid #5a0f0f;
    border-radius: 5px;
    width: 100%;
  }

  .result {
    background-color: #f3dede;
    text-align: center;
  }

  button {
    background-color: #7a1c1c;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background-color: #5a0f0f;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
  }

  .big-btn {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-top: 20px;
  }

  .extra-box {
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Revans Culculator Tool          </h1>
<h3> Ψήφοι ανά δύναμη        ------ Έδρες</h3>
  <div id="list"></div>

  <div class="controls">
    <button onclick="addItem()">+ Add Item</button>
    <button onclick="removeItem()">- Remove Item</button>
  </div>
<h3> Αριθμός εδρών του Συλλόγου</h3>
  <div class="extra-box">
    <input id="extraInput" type="number" placeholder="Extra number">
  </div>

  <button class="big-btn" onclick="calculate()">Calculate</button>
</div>

<script>
  function addItem() {
    const list = document.getElementById("list");

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <input type="number" placeholder="Votes">
      <input class="result" type="text" placeholder="Seats" disabled>
      <input class="result" type="text" placeholder="Remainder" disabled>
    `;

    list.appendChild(div);
  }

  function removeItem() {
    const list = document.getElementById("list");
    if (list.lastChild) {
      list.removeChild(list.lastChild);
    }
  }

  function calculate() {
    const items = document.querySelectorAll(".item");
    const extra = Number(document.getElementById("extraInput").value);

    let sum = 0;

    // 1️⃣ Υπολογίζουμε το συνολικό άθροισμα ψήφων
    items.forEach(item => {
      sum += Number(item.children[0].value || 0);
    });

    // 2️⃣ Υπολογίζουμε το "μέτρο"
    const metro = sum / extra;

    let results = [];

    // 3️⃣ Για κάθε item:
    // - βρίσκουμε πόσες φορές χωράει το metro (ακέραιο μέρος)
    // - βρίσκουμε το υπόλοιπο
    items.forEach((item, index) => {
      const votes = Number(item.children[0].value || 0);

      const seats = Math.floor(votes / metro); // ακέραιες έδρες
      const remainder = votes % metro;         // υπόλοιπο

      results.push({
        index: index,
        seats: seats,
        remainder: remainder
      });
    });

    // 4️⃣ Υπολογίζουμε πόσες έδρες έχουν δοθεί ήδη
    let givenSeats = results.reduce((sum, r) => sum + r.seats, 0);

    // 5️⃣ Πόσες απομένουν
    let remainingSeats = extra - givenSeats;

    // 6️⃣ Ταξινομούμε κατά φθίνουσα σειρά υπολοίπου
    results.sort((a, b) => b.remainder - a.remainder);

    // 7️⃣ Δίνουμε τις υπόλοιπες έδρες στους μεγαλύτερους υπολοίπους
    for (let i = 0; i < remainingSeats; i++) {
      results[i].seats += 1;
      results[i].remainder = 0; // μηδενίζουμε το υπόλοιπο όπως ζήτησες
    }

    // 8️⃣ Ξαναβάζουμε τα αποτελέσματα στη σωστή σειρά
    results.sort((a, b) => a.index - b.index);

    // 9️⃣ Εμφάνιση στα inputs
    results.forEach((r, i) => {
      const item = items[i];
      item.children[1].value = r.seats;
      item.children[2].value = r.remainder.toFixed(2);
    });
  }

  // αρχικά items
  addItem();
  addItem();
  addItem();
</script>

</body>
</html>
